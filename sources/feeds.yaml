# ========================================
# 过滤和处理规则
# ========================================
filtering_rules:
  # 关键词过滤
  keywords:
    include:
      - "agentic ai"
      - "multi-agent"
      - "llm"
      - "large language model"
      - "generative ai"
      - "machine learning systems"
      - "ai agents"
      - "autonomous agents"
      - "ai infrastructure"
      - "model training"
      - "fine-tuning"
      - "prompt engineering"
      - "rag"
      - "retrieval augmented"
      - "ai safety"
      - "alignment"
      - "scalability"
      - "distributed systems"
      
    exclude:
      - "sponsored"
      - "advertisement"
      - "webinar registration"
      
  # 内容类型优先级
  content_types:
    technical_deep_dive: "high"
    research_paper: "high"
    case_study: "medium"
    product_announcement: "medium"
    tutorial: "low"
    opinion: "low"
    
  # 语言过滤
  languages:
    - "en"
    - "zh-CN"
    
  # 最小内容长度（字符数）
  min_content_length: 500
  
  # 去重规则
  deduplication:
    enabled: true
    similarity_threshold: 0.85
    time_window_hours: 72

# ========================================
# 抓取配置
# ========================================
fetch_config:
  # 并发设置
  max_concurrent_fetches: 10
  
  # 超时设置（秒）
  timeout: 30
  
  # 重试设置
  max_retries: 3
  retry_delay: 5
  
  # User Agent
  user_agent: "AI-Daily-Digest/1.0 (+https://github.com/yourusername/ai-daily-digest)"
  
  # 缓存设置
  cache:
    enabled: true
    ttl_hours: 24
    
  # 速率限制
  rate_limiting:
    enabled: true
    requests_per_minute: 60

# ========================================
# 输出配置
# ========================================
output_config:
  # 日报生成时间（UTC）
  digest_time: "09:00"
  
  # 最大文章数量
  max_articles_per_digest: 30
  
  # 分类方式
  categorization:
    - "工程实践"
    - "前沿研究"
    - "行业洞察"
    - "创业观察"
    - "开源项目"
    
  # 输出格式
  formats:
    - "markdown"
    - "html"
    - "json"
    
  # 邮件设置
  email:
    enabled: false
    subject_prefix: "[AI Daily Digest]"
    
  # Slack通知
  slack:
    enabled: false
    webhook_url: ""
    channel: "#ai-digest"

# ========================================
# 特殊标签和跟踪
# ========================================
tracking:
  # 重点关注的主题标签
  focus_topics:
    - "agentic-ai"
    - "multi-agent-systems"
    - "llm-optimization"
