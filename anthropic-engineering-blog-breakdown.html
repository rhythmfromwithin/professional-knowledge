<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anthropic Engineering Blog — 三视角拆解</title>
    <meta
      name="description"
      content="Anthropic 工程博客文章：CS 学生 / 技术 PM / 非技术人员三视角 Why / What / How 重写。"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111827;
        --muted: #6b7280;
        --card: #f8fafc;
        --line: #e5e7eb;
        --link: #2563eb;
        --accent: #0f172a;
        --max: 1320px;
        --sidebar: 300px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --fg: #e5e7eb;
          --muted: #94a3b8;
          --card: #111827;
          --line: #1f2937;
          --link: #60a5fa;
          --accent: #f8fafc;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.7;
      }

      a {
        color: var(--link);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--card);
      }

      .wrap {
        width: min(calc(100% - 32px), var(--max));
        margin: 0 auto;
      }

      .hero {
        padding: 28px 0 20px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .page-title {
        margin: 0;
        font-size: clamp(28px, 4.5vw, 44px);
        line-height: 1.1;
      }

      .page-subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 16px;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        text-decoration: none;
        color: var(--fg);
        background: var(--bg);
        cursor: pointer;
        font: inherit;
      }

      .actions a.primary {
        color: #ffffff;
        background: var(--link);
        border-color: var(--link);
      }

      main {
        padding: 28px 0 64px;
      }

      .layout {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        gap: 28px;
        align-items: start;
      }

      .sidebar {
        position: sticky;
        top: 16px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
      }

      .sidebar h2 {
        margin: 0 0 12px;
        font-size: 15px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      #toc {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: calc(100vh - 120px);
        overflow: auto;
        padding-right: 4px;
      }

      .toc-item {
        display: block;
        color: var(--fg);
        text-decoration: none;
        font-size: 14px;
        line-height: 1.45;
      }

      .toc-item.level-2 {
        font-weight: 600;
      }

      .toc-item.level-3 {
        padding-left: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .reader {
        min-width: 0;
      }

      #status {
        color: var(--muted);
        margin: 0;
      }

      article {
        font-size: 18px;
      }

      article h1,
      article h2,
      article h3,
      article h4 {
        line-height: 1.22;
        margin-top: 1.8em;
        margin-bottom: 0.6em;
        scroll-margin-top: 24px;
      }

      article h1 {
        font-size: 2.1em;
      }

      article h2 {
        font-size: 1.55em;
        border-bottom: 1px solid var(--line);
        padding-bottom: 0.25em;
      }

      article h3 {
        font-size: 1.2em;
      }

      article blockquote {
        margin: 1.2em 0;
        padding: 0.1em 1em;
        border-left: 4px solid var(--link);
        background: var(--card);
      }

      article code,
      article pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      article code {
        padding: 0.12em 0.35em;
        border-radius: 6px;
        background: var(--card);
      }

      article pre {
        overflow-x: auto;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--card);
        border: 1px solid var(--line);
      }

      article img {
        max-width: 100%;
      }

      article hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 2em 0;
      }

      footer {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        padding: 20px 0 40px;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }

        #toc {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap hero">
        <p class="eyebrow">GitHub Pages · professional-knowledge</p>
        <h1 class="page-title">Anthropic Engineering Blog — 三视角拆解</h1>
        <p class="page-subtitle">每篇从 CS 学生、技术 PM、非技术人员三个角度重写 Why / What / How。</p>
        <div class="actions">
          <a class="primary" href="./anthropic-engineering-blog-breakdown.md">Open Raw Markdown</a>
          <a href="./index.html">Agent Product Book</a>
          <a href="https://github.com/rhythmfromwithin/professional-knowledge">View Repository</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="layout">
        <aside class="sidebar">
          <h2>目录</h2>
          <nav id="toc"></nav>
        </aside>

        <section class="reader">
          <p id="status">Loading…</p>
          <article id="content"></article>
        </section>
      </div>
    </main>

    <footer>
      <div class="wrap">Source: <code>anthropic-engineering-blog-breakdown.md</code></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const articleEl = document.getElementById("content");
      const tocEl = document.getElementById("toc");

      marked.setOptions({ breaks: true, gfm: true });

      function slugify(text) {
        return text
          .trim()
          .toLowerCase()
          .replace(/[^\u3400-\u9fff\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }

      function decorateHeadings() {
        const headings = [...articleEl.querySelectorAll("h1, h2, h3, h4")];
        const seen = new Map();
        for (const heading of headings) {
          const base = slugify(heading.textContent || "section");
          const count = seen.get(base) || 0;
          seen.set(base, count + 1);
          heading.id = count ? `${base}-${count + 1}` : base;
        }
      }

      function buildToc() {
        const headings = [...articleEl.querySelectorAll("h2, h3")];
        tocEl.innerHTML = headings
          .map((h) => {
            const level = h.tagName === "H2" ? 2 : 3;
            const label = (h.textContent || "").trim();
            return `<a class="toc-item level-${level}" href="#${h.id}">${label}</a>`;
          })
          .join("");
      }

      fetch("./anthropic-engineering-blog-breakdown.md", { cache: "no-store" })
        .then((r) => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.text();
        })
        .then((md) => {
          articleEl.innerHTML = marked.parse(md);
          decorateHeadings();
          buildToc();
          statusEl.hidden = true;
        })
        .catch((e) => {
          statusEl.textContent = `Could not load: ${e.message}`;
        });
    </script>
  </body>
</html>
