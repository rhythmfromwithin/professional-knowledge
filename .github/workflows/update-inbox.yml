name: Update Inbox from Slack

on:
  workflow_dispatch:
    inputs:
      slack_ts:
        description: 'Slack message timestamp (slack_ts in frontmatter)'
        required: true
      interest:
        description: 'Interest level: high / medium / low'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: 'professional-knowledge'

      - name: Pull latest changes
        run: git pull --rebase origin main
        working-directory: ./professional-knowledge

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml
        working-directory: ./professional-knowledge

      - name: Update frontmatter and move file
        run: python scripts/scripts/update_frontmatter.py
        working-directory: ./professional-knowledge
        env:
          SLACK_TS: ${{ github.event.inputs.slack_ts }}
          INTEREST: ${{ github.event.inputs.interest }}

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "inbox: move article [interest=${{ github.event.inputs.interest }}]"
            git push
          fi
        working-directory: ./professional-knowledge
