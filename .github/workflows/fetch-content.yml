name: Daily Intelligence Sync

on:
  schedule:
    - cron: '0 1 * * *' # 北京时间上午 9:00
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Fetch RSS
        run: python scripts/fetch_rss.py
      - name: Commit and Push
        run: |
          git config --global user.name "Intelligence-Bot"
          git config --global user.email "bot@github.com"
          git add inbox/*.md
          git commit -m "Auto-update: New items in inbox" || exit 0
          git push