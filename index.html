<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Product Book</title>
    <meta
      name="description"
      content="Agent Product Book with a table of contents and separate Chinese / English reading modes."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111827;
        --muted: #6b7280;
        --card: #f8fafc;
        --line: #e5e7eb;
        --link: #2563eb;
        --accent: #0f172a;
        --max: 1320px;
        --sidebar: 300px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --fg: #e5e7eb;
          --muted: #94a3b8;
          --card: #111827;
          --line: #1f2937;
          --link: #60a5fa;
          --accent: #f8fafc;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.7;
      }

      a {
        color: var(--link);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--card);
      }

      .wrap {
        width: min(calc(100% - 32px), var(--max));
        margin: 0 auto;
      }

      .hero {
        padding: 28px 0 20px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .page-title {
        margin: 0;
        font-size: clamp(28px, 4.5vw, 44px);
        line-height: 1.1;
      }

      .page-subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 16px;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .actions a,
      .lang-switch button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        text-decoration: none;
        color: var(--fg);
        background: var(--bg);
        cursor: pointer;
        font: inherit;
      }

      .actions a.primary,
      .lang-switch button.active {
        color: #ffffff;
        background: var(--link);
        border-color: var(--link);
      }

      main {
        padding: 28px 0 64px;
      }

      .layout {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        gap: 28px;
        align-items: start;
      }

      .sidebar {
        position: sticky;
        top: 16px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
      }

      .sidebar h2 {
        margin: 0 0 12px;
        font-size: 15px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .lang-switch {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
      }

      #toc {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: calc(100vh - 180px);
        overflow: auto;
        padding-right: 4px;
      }

      .toc-item {
        display: block;
        color: var(--fg);
        text-decoration: none;
        font-size: 14px;
        line-height: 1.45;
      }

      .toc-item.level-1 {
        font-weight: 700;
      }

      .toc-item.level-2 {
        padding-left: 12px;
      }

      .toc-item.level-3 {
        padding-left: 24px;
        color: var(--muted);
      }

      .reader {
        min-width: 0;
      }

      #status {
        color: var(--muted);
        margin: 0;
      }

      article {
        font-size: 18px;
      }

      article[hidden] {
        display: none;
      }

      article h1,
      article h2,
      article h3,
      article h4 {
        line-height: 1.22;
        margin-top: 1.8em;
        margin-bottom: 0.6em;
        scroll-margin-top: 24px;
      }

      article h1 {
        font-size: 2.1em;
      }

      article h2 {
        font-size: 1.55em;
        border-bottom: 1px solid var(--line);
        padding-bottom: 0.25em;
      }

      article h3 {
        font-size: 1.2em;
      }

      article blockquote {
        margin: 1.2em 0;
        padding: 0.1em 1em;
        border-left: 4px solid var(--link);
        background: var(--card);
      }

      article code,
      article pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      article code {
        padding: 0.12em 0.35em;
        border-radius: 6px;
        background: var(--card);
      }

      article pre {
        overflow-x: auto;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--card);
        border: 1px solid var(--line);
      }

      article img {
        max-width: 100%;
      }

      article hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 2em 0;
      }

      footer {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        padding: 20px 0 40px;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }

        #toc {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap hero">
        <p class="eyebrow">GitHub Pages</p>
        <h1 class="page-title">Agent Product Book</h1>
        <p class="page-subtitle" id="subtitle">
          Separate Chinese and English reading modes with a live table of contents.
        </p>
        <div class="actions">
          <a class="primary" href="./agent_product_book.md">Open Raw Markdown</a>
          <a href="https://github.com/rhythmfromwithin/professional-knowledge">View Repository</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="layout">
        <aside class="sidebar">
          <div class="lang-switch">
            <button id="show-cn" class="active" type="button">中文</button>
            <button id="show-en" type="button">English</button>
          </div>
          <h2 id="toc-title">目录</h2>
          <nav id="toc"></nav>
        </aside>

        <section class="reader">
          <p id="status">Loading book content...</p>
          <article id="content-cn" hidden></article>
          <article id="content-en" hidden></article>
        </section>
      </div>
    </main>

    <footer>
      <div class="wrap">
        This page renders <code>agent_product_book.md</code> and separates Chinese / English views for easier reading.
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const cnEl = document.getElementById("content-cn");
      const enEl = document.getElementById("content-en");
      const tocEl = document.getElementById("toc");
      const tocTitleEl = document.getElementById("toc-title");
      const pageTitleEl = document.querySelector(".page-title");
      const subtitleEl = document.getElementById("subtitle");
      const showCnBtn = document.getElementById("show-cn");
      const showEnBtn = document.getElementById("show-en");

      const state = {
        activeLang: "cn",
      };

      marked.setOptions({
        breaks: true,
        gfm: true,
      });

      function hasChinese(text) {
        return /[\u3400-\u9fff]/.test(text);
      }

      function countMatches(text, regex) {
        const matches = text.match(regex);
        return matches ? matches.length : 0;
      }

      function detectLanguage(line) {
        const plain = line.replace(/[`*_#>\-\d.[\]()!|:]/g, " ");
        const chineseCount = countMatches(plain, /[\u3400-\u9fff]/g);
        const englishCount = countMatches(plain, /[A-Za-z]/g);

        if (!chineseCount && !englishCount) return "neutral";
        if (chineseCount && !englishCount) return "cn";
        if (englishCount && !chineseCount) return "en";
        return chineseCount * 1.2 >= englishCount ? "cn" : "en";
      }

      function splitBilingualText(text, lang) {
        const slashParts = text.split(/\s+\/\s+/);
        if (slashParts.length === 2) {
          let selected = lang === "cn" ? slashParts[0] : slashParts[1];
          if (lang === "cn") {
            selected = selected.replace(/\s*[（(][A-Za-z][^）)]*[）)]\s*$/u, "").trim();
          }
          return selected.trim();
        }
        return text;
      }

      function transformLine(line, lang) {
        const headingMatch = line.match(/^(#{1,6}\s+)(.*)$/);
        if (headingMatch) {
          return `${headingMatch[1]}${splitBilingualText(headingMatch[2], lang)}`;
        }

        const quoteMatch = line.match(/^(>\s+)(.*)$/);
        if (quoteMatch) {
          return `${quoteMatch[1]}${splitBilingualText(quoteMatch[2], lang)}`;
        }

        return line;
      }

      function splitMarkdownByLanguage(markdown) {
        const lines = markdown.split(/\r?\n/);
        const cnLines = [];
        const enLines = [];
        let inCode = false;

        for (const line of lines) {
          const trimmed = line.trim();

          if (trimmed.startsWith("```")) {
            inCode = !inCode;
            cnLines.push(line);
            enLines.push(line);
            continue;
          }

          if (inCode || trimmed === "" || trimmed === "---" || trimmed.startsWith("|")) {
            cnLines.push(line);
            enLines.push(line);
            continue;
          }

          const lang = detectLanguage(line);
          if (lang === "neutral") {
            cnLines.push(line);
            enLines.push(line);
          } else if (lang === "cn") {
            cnLines.push(transformLine(line, "cn"));
          } else {
            enLines.push(transformLine(line, "en"));
          }
        }

        return {
          cn: cnLines.join("\n"),
          en: enLines.join("\n"),
        };
      }

      function slugify(text) {
        return text
          .trim()
          .toLowerCase()
          .replace(/[^\u3400-\u9fff\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }

      function decorateHeadings(articleEl, lang) {
        const headings = [...articleEl.querySelectorAll("h1, h2, h3")];
        const seen = new Map();

        for (const heading of headings) {
          const base = `${lang}-${slugify(heading.textContent || "section")}`;
          const count = seen.get(base) || 0;
          seen.set(base, count + 1);
          heading.id = count ? `${base}-${count + 1}` : base;
        }
      }

      function buildToc(articleEl, lang) {
        const headings = [...articleEl.querySelectorAll("h1, h2, h3")];
        tocTitleEl.textContent = lang === "cn" ? "目录" : "Contents";

        tocEl.innerHTML = headings
          .map((heading) => {
            const level = Number(heading.tagName.slice(1));
            return `<a class="toc-item level-${level}" href="#${heading.id}">${heading.textContent}</a>`;
          })
          .join("");
      }

      function setActiveLanguage(lang) {
        state.activeLang = lang;
        const isCn = lang === "cn";
        cnEl.hidden = !isCn;
        enEl.hidden = isCn;
        showCnBtn.classList.toggle("active", isCn);
        showEnBtn.classList.toggle("active", !isCn);
        buildToc(isCn ? cnEl : enEl, lang);
      }

      showCnBtn.addEventListener("click", () => setActiveLanguage("cn"));
      showEnBtn.addEventListener("click", () => setActiveLanguage("en"));

      fetch("./agent_product_book.md", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Failed to load markdown (${response.status})`);
          }
          return response.text();
        })
        .then((markdown) => {
          const split = splitMarkdownByLanguage(markdown);
          const cnTitle = split.cn.match(/^#\s+(.+)$/m);
          const enTitle = split.en.match(/^#\s+(.+)$/m);

          if (cnTitle) {
            pageTitleEl.textContent = cnTitle[1];
            document.title = cnTitle[1];
          }
          if (enTitle) {
            subtitleEl.textContent = enTitle[1];
          }

          cnEl.innerHTML = marked.parse(split.cn);
          enEl.innerHTML = marked.parse(split.en);
          decorateHeadings(cnEl, "cn");
          decorateHeadings(enEl, "en");

          statusEl.hidden = true;
          setActiveLanguage("cn");
        })
        .catch((error) => {
          statusEl.textContent = `Could not load the book: ${error.message}`;
        });
    </script>
  </body>
</html>
