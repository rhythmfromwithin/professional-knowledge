<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Product Book</title>
    <meta
      name="description"
      content="Render agent_product_book.md as a GitHub Pages reading experience."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111827;
        --muted: #6b7280;
        --card: #f8fafc;
        --line: #e5e7eb;
        --link: #2563eb;
        --max: 920px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --fg: #e5e7eb;
          --muted: #94a3b8;
          --card: #111827;
          --line: #1f2937;
          --link: #60a5fa;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.7;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--card);
      }

      .wrap {
        width: min(calc(100% - 32px), var(--max));
        margin: 0 auto;
      }

      .hero {
        padding: 28px 0 20px;
      }

      .eyebrow {
        font-size: 13px;
        color: var(--muted);
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1.page-title {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.15;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .actions a {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        text-decoration: none;
        color: var(--fg);
        background: var(--bg);
      }

      .actions a.primary {
        color: white;
        background: var(--link);
        border-color: var(--link);
      }

      main {
        padding: 28px 0 64px;
      }

      #status {
        color: var(--muted);
      }

      article {
        font-size: 18px;
      }

      article h1,
      article h2,
      article h3,
      article h4 {
        line-height: 1.25;
        margin-top: 1.75em;
        margin-bottom: 0.6em;
      }

      article h1 {
        font-size: 2em;
      }

      article h2 {
        font-size: 1.5em;
        border-bottom: 1px solid var(--line);
        padding-bottom: 0.25em;
      }

      article a {
        color: var(--link);
      }

      article blockquote {
        margin: 1.2em 0;
        padding: 0.1em 1em;
        border-left: 4px solid var(--link);
        background: var(--card);
      }

      article code,
      article pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      article code {
        padding: 0.12em 0.35em;
        border-radius: 6px;
        background: var(--card);
      }

      article pre {
        overflow-x: auto;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--card);
        border: 1px solid var(--line);
      }

      article img {
        max-width: 100%;
      }

      article hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 2em 0;
      }

      footer {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        padding: 20px 0 40px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap hero">
        <p class="eyebrow">GitHub Pages</p>
        <h1 class="page-title">Agent Product Book</h1>
        <div class="actions">
          <a class="primary" href="./agent_product_book.md">Open Raw Markdown</a>
          <a href="https://github.com/rhythmfromwithin/professional-knowledge">View Repository</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <p id="status">Loading book content...</p>
      <article id="content" hidden></article>
    </main>

    <footer>
      <div class="wrap">
        This page renders <code>agent_product_book.md</code> directly from this repository.
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const contentEl = document.getElementById("content");

      marked.setOptions({
        breaks: true,
        gfm: true,
      });

      fetch("./agent_product_book.md", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Failed to load markdown (${response.status})`);
          }
          return response.text();
        })
        .then((markdown) => {
          const firstTitle = markdown.match(/^#\s+(.+)$/m);
          if (firstTitle) {
            document.title = firstTitle[1];
            document.querySelector(".page-title").textContent = firstTitle[1];
          }
          contentEl.innerHTML = marked.parse(markdown);
          statusEl.hidden = true;
          contentEl.hidden = false;
        })
        .catch((error) => {
          statusEl.textContent = `Could not load the book: ${error.message}`;
        });
    </script>
  </body>
</html>
